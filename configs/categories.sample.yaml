# Конфиг категоризации для игрушечных выписок из demo_data/.
# Покрывает все транзакции образцов: каждая попадает ровно в одно правило.
# Правила сортируются по priority (меньше = проверяется раньше), побеждает первое
# совпавшее. Условие `category` сверяется точно (после нормализации регистра/пунктуации),
# поэтому «Начисленные %» указывается как «Начисленные».

# =====================  ДОХОДЫ  =====================

- name: Зарплата
  priority: 1
  conditions:
    type: [доход]
    description_contains:
      - зарплата
  new_category: Зарплата

- name: Доход с вкладов
  priority: 2
  conditions:
    type: [доход]
    category:
      - Начисленные
      - Капитализация
      - Пролонгация
  new_category: Доход с вкладов

- name: Прочие доходы
  priority: 3
  conditions:
    type: [доход]
    category:
      - Пополнения
      - Переводы
  new_category: Прочие доходы

# =====================  ВОЗВРАТЫ  =====================
# Возврат от маркетплейса (T-Bank). После категоризации assign_refunds пометит type=возврат.

- name: Возвраты
  priority: 5
  conditions:
    category:
      - Возвраты
  new_category: Маркетплейсы

# =====================  РАСХОДЫ  =====================

# --- Чаевые Ozon (раньше общего правила «Маркетплейсы») ---
