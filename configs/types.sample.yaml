# Конфиг типизации для игрушечных выписок из demo_data/.
# Используется так:
#   python run_pipeline.py --data-dir demo_data \
#     --types-config configs/types.sample.yaml \
#     --categories-config configs/categories.sample.yaml
#
# Все данные в demo_data/ вымышленные, поэтому файл можно держать в git.

# Счета-«копилки»: тип выводится из категории/корр. счёта, а не из направления
account_like:
  - sber_deposit
  - sber_account

# Карты/кошельки: тип выводится из направления (+/-) и internal_keywords
card_like:
  - sber_card
  - tbank
  - ozon

# Категории вкладов, считающиеся доходом (сверяются с очищенной категорией)
income_categories:
  - начисленные      # «Начисленные %»
  - капитализация
  - пролонгация

# Описания, по которым операция считается переводом между своими счетами
# (такие строки потом отбрасываются как «внутренний»)
internal_keywords:
  - зачисление с карты   # Ozon: пополнение кошелька с карты
  - ozon сбп перевод     # Ozon: пополнение кошелька переводом по СБП

# Корр. счета внешних получателей: для счетов-«копилок» делают операцию расходом
external_accounts:
  - "30301810000000000009"   # корр. счёт благотворительного фонда (вклад)

# --- Возвраты ---
refund_keywords:
  - возврат
  - отмена
  - refund

# Категории доходов, которые НЕ должны переклассифицироваться в «возврат»
refund_exclude_categories:
  - перевод
  - зарплата
  - доход      # покрывает «Доход с вкладов» и «Прочие доходы»
  - кешбек
